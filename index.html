        .fav-top-btn { background: rgba(255,45,127,0.15); border: 1px solid #ff2d7f; color: #ff2d7f; padding: 6px 14px; border-radius: 30px; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 6px; }

        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .fav-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 30px; padding: 25px; z-index: 5000; width: 90%; max-width: 380px; border: 2px solid #ff2d7f; text-align: center; max-height: 80vh; display: none; flex-direction: column; opacity: 0; transition: all 0.3s; }
        .fav-modal.open { display: flex; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .fav-item .info { flex: 1; cursor: pointer; min-width: 0; }

        .feedback-modal .close-feedback { background: rgba(255,255,255,0.1) !important; color: white !important; margin-top: 5px; }

        .progress-time { display: flex; justify-content: space-between; font-size: 0.65rem; color: #aaa; margin-bottom: 4px; }

        .buttons-row { display: flex; align-items: center; justify-content: center; gap: 25px; margin-top: 12px; }

        .ctrl-btn:active { transform: scale(0.92); background: var(--neon-cyan); color: #000; }

        .fab-sub.open { display: flex; }
        .fab-sub-btn { background: rgba(255,255,255,0.06); border: none; color: white; padding: 12px 24px; border-radius: 25px; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background 0.2s; white-space: nowrap; min-width: 160px; }
        .fab-sub-btn:active { background: var(--neon-cyan); color: #000; }
        .fab-sub-btn i { font-size: 1.2rem; width: 24px; text-align: center; pointer-events: none; }

        .menu-button { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); color: white; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; z-index: 31; border: 1px solid rgba(0,243,255,0.3); }
        .menu-button:active { background: var(--neon-cyan); color: #000; }
        .menu-popup { position: absolute; top: 65px; right: 12px; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-radius: 16px; padding: 10px; z-index: 32; display: none; flex-direction: column; gap: 8px; border: 1px solid var(--neon-cyan); min-width: 180px; }
        .menu-popup.open { display: flex; }
        .menu-popup button { background: rgba(255,255,255,0.08); border: none; color: white; padding: 10px 20px; border-radius: 30px; font-size: 0.8rem; display: flex; align-items: center; gap: 10px; cursor: pointer; text-align: left; }
        .menu-popup button:active { background: var(--neon-cyan); color: #000; }
        
        .audio-indicator { position: absolute; top: 12px; right: 70px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); padding: 4px 10px; border-radius: 20px; font-size: 0.6rem; color: #ffaa00; z-index: 31; display: flex; align-items: center; gap: 5px; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
        #splash.hidden { opacity: 0; pointer-events: none; }

        #tap-to-start { position: fixed; bottom: 30%; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #4a4a4a, #2a2a2a); color: white; padding: 14px 32px; border-radius: 50px; font-weight: bold; font-size: 1rem; z-index: 10000; cursor: pointer; display: none; animation: btnPulse 1.5s infinite; border: none; box-shadow: 0 0 20px rgba(255,255,255,0.15); }
        @keyframes btnPulse { 0% { transform: translateX(-50%) scale(1); opacity: 0.9; } 50% { transform: translateX(-50%) scale(1.03); opacity: 1; } 100% { transform: translateX(-50%) scale(1); opacity: 0.9; } }
        
        .notification { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); color: var(--neon-cyan); padding: 8px 20px; border-radius: 30px; font-size: 0.75rem; z-index: 10001; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; border-left: 3px solid var(--neon-cyan); }

        @media (max-width: 480px) {

</head>
<body>

        // =================================================================
        // PLAYER
        // =================================================================
        function createSilentAudio() {
            try {
                const sampleRate = 44100, duration = 1;
                const numSamples = sampleRate * duration;
                const buffer = new ArrayBuffer(44 + numSamples * 2);
                const view = new DataView(buffer);
                const writeString = (view, offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
                writeString(view, 0, 'RIFF');
                view.setUint32(4, 36 + numSamples * 2, true);
                writeString(view, 8, 'WAVE');
                writeString(view, 12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(view, 36, 'data');
                view.setUint32(40, numSamples * 2, true);
                let offset = 44;
                for (let i = 0; i < numSamples; i++) { view.setInt16(offset, 0, true); offset += 2; }
                return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
            } catch(e) {
                return '';
            }
        }
        const backgroundAudio = document.getElementById('backgroundAudio');

        async function ativarAudio() {
            try {
                const silentUrl = createSilentAudio();
                if (!silentUrl) throw new Error('Erro ao criar áudio');
                backgroundAudio.src = silentUrl;
                backgroundAudio.loop = true;
                backgroundAudio.volume = 0.001;
                await backgroundAudio.play();
                isBackgroundActive = true;
                audioIndicator.innerHTML = '<i class="fas fa-music"></i> Ativo';
                audioIndicator.style.color = '#4ade80';
                if ('wakeLock' in navigator) try { await navigator.wakeLock.request('screen'); } catch (e) {}
                await playMusic();
                return true;
            } catch (error) {
                console.error('Erro ativar audio:', error);
                isBackgroundActive = true;
                await playMusic();
                return true;
            }
        }

        function adicionarAoHistorico(musica) {
            if (!musica) return;
            historicoReproducao = historicoReproducao.filter(m => m.id !== musica.id);
            historicoReproducao.unshift(musica);
            if (historicoReproducao.length > MAX_HISTORICO) historicoReproducao.pop();
        }

        function getMusicaAntiRepeticao(lista, evitarId = null) {
            if (!lista || lista.length === 0) return null;
            if (lista.length === 1) {
                const unica = lista[0];
                adicionarAoHistorico(unica);
                return unica;
            }
            let idsHistorico = new Set(historicoReproducao.map(m => m.id));
            let candidatas = lista.filter(m => !idsHistorico.has(m.id));
            if (candidatas.length === 0) {
                const idsLiberados = historicoReproducao.slice(-3).map(m => m.id);
                candidatas = lista.filter(m => idsLiberados.includes(m.id));
                if (candidatas.length === 0) candidatas = [...lista];
            }
            if (evitarId && candidatas.length > 1) {
                candidatas = candidatas.filter(m => m.id !== evitarId);
            }
            if (candidatas.length === 0) candidatas = [...lista];
            const escolhida = candidatas[Math.floor(Math.random() * candidatas.length)];
            adicionarAoHistorico(escolhida);
            return escolhida;
        }

        function getMusicaMPBPOPAntiRepeticao(evitarId = null) {
            const mpb = musicas.filter(m => m.genero === "MPB");
            const pop = musicas.filter(m => m.genero === "POP");
            if (mpb.length === 0 && pop.length === 0) return getMusicaAntiRepeticao(musicas, evitarId);
            if (mpb.length === 0) return getMusicaAntiRepeticao(pop, evitarId);
            if (pop.length === 0) return getMusicaAntiRepeticao(mpb, evitarId);
            
            let novoGenero;
            if (ultimoGeneroTocado === "MPB") novoGenero = "POP";
            else if (ultimoGeneroTocado === "POP") novoGenero = "MPB";
            else novoGenero = Math.random() < 0.5 ? "MPB" : "POP";
            
            let lista = novoGenero === "MPB" ? mpb : pop;
            const m = getMusicaAntiRepeticao(lista, evitarId);
            if (m) ultimoGeneroTocado = m.genero;
            return m;
        }

        function trocarVideoPorGenero(genero) {
            let src = 'apk300.mp4';
            const g = (genero || '').toUpperCase().trim();
            if (g === 'SERTANEJO') src = 'sertanejo.mp4';
            else if (g === 'CRISTÃ HITS' || g === 'CRISTÃ' || g === 'GOSPEL') src = 'cristo.mp4';
            if (!bgVideo.src.includes(src)) {
                bgVideo.src = src;
                bgVideo.load();
                bgVideo.play().catch(e => console.log('Vídeo:', e));

        async function playMusic() {
            if (!isBackgroundActive) {
                showNotification("⚠️ Ative o áudio primeiro!", 1000);
                return;
            }
            if (!musicas.length) { showNotification("Playlist vazia!", 1500); return; }

            let track = null;
            if (modoAtual === "MPB_POP") {
                const evitarId = currentPlaylist[0]?.id || null;
                track = getMusicaMPBPOPAntiRepeticao(evitarId);
                if (track) { currentPlaylist = [track]; currentIndex = 0; }
            } else {
                if (currentPlaylist.length === 0) {
                    track = getMusicaAntiRepeticao(musicas);
                    if (track) currentPlaylist = [track];
                } else {
                    if (shuffleMode) {
                        const disponiveis = currentPlaylist.filter(m => !historicoReproducao.find(h => h.id === m.id));
                        if (disponiveis.length > 0) {
                            track = disponiveis[Math.floor(Math.random() * disponiveis.length)];
                        } else {
                            const liberados = historicoReproducao.slice(-3).map(m => m.id);
                            const candidatos = currentPlaylist.filter(m => liberados.includes(m.id));
                            track = candidatos.length > 0 ? candidatos[Math.floor(Math.random() * candidatos.length)] : currentPlaylist[0];
                        }
                    } else {
                        currentIndex = (currentIndex + 1) % currentPlaylist.length;
                        track = currentPlaylist[currentIndex];
                    }
                    if (track) adicionarAoHistorico(track);
                }
            }

            if (!track || !track.src) {
                showNotification("Música indisponível", 1000);
                nextTrack();
                return;
            }

            trocarVideoPorGenero(track.genero);
            
            audio.pause();
            audio.src = track.src;
            audio.load();

            audio.oncanplay = () => {
                audio.play().then(() => {
                    updateNowPlaying(track);
                }).catch(e => {
                    console.error("Erro ao tocar:", e);
                    nextTrack();
                });
            };

            audio.onerror = () => {
                console.log(`⏭️ Erro: ${track.title}`);
                nextTrack();
            };
        }

        function pauseMusic() { audio.pause(); }
        
        function togglePlay() {
            if (!isBackgroundActive) { 
                showNotification("Clique em ATIVAR RÁDIO primeiro!", 1000); 
                return; 
            }
            if (audio.paused) {
                playMusic();
            } else {
                pauseMusic();
            }
            showControls();
        }

        function nextTrack() {
            if (modoAtual === "MPB_POP") {
                const atual = currentPlaylist[0];
                const nova = getMusicaMPBPOPAntiRepeticao(atual?.id);
                if (nova) {
                    currentPlaylist = [nova];
                    currentIndex = 0;
                    updateNowPlaying(nova);
                    trocarVideoPorGenero(nova.genero);
                    if (isPlaying) playMusic();
                }
            } else {
                if (currentPlaylist.length === 0) {
                    const m = getMusicaAntiRepeticao(musicas);
                    if (m) {
                        currentPlaylist = [m];
                        currentIndex = 0;
                        updateNowPlaying(m);
                        trocarVideoPorGenero(m.genero);
                        if (isPlaying) playMusic();
                    }
                    return;
                }
                if (currentPlaylist.length === 1) {
                    const unica = currentPlaylist[0];
                    adicionarAoHistorico(unica);
                    updateNowPlaying(unica);
                    trocarVideoPorGenero(unica.genero);
                    if (isPlaying) playMusic();
                    showControls();
                    return;
                }
                let proxima = null;
                let tentativas = 0;
                const maxTentativas = currentPlaylist.length * 3;
                const evitarId = currentPlaylist[currentIndex]?.id;
                while (tentativas < maxTentativas) {
                    tentativas++;
                    let idx = shuffleMode ? Math.floor(Math.random() * currentPlaylist.length) : (currentIndex + 1) % currentPlaylist.length;
                    const candidata = currentPlaylist[idx];
                    if (candidata.id === evitarId && currentPlaylist.length > 1) continue;
                    const noHistorico = !historicoReproducao.find(h => h.id === candidata.id);
                    if (noHistorico || historicoReproducao.length < 3 || currentPlaylist.length <= 3) {
                        proxima = candidata;
                        currentIndex = idx;
                        break;
                    }
                }
                if (!proxima) {
                    currentIndex = shuffleMode ? Math.floor(Math.random() * currentPlaylist.length) : (currentIndex + 1) % currentPlaylist.length;
                    proxima = currentPlaylist[currentIndex];
                }
                if (proxima) {
                    adicionarAoHistorico(proxima);
                    updateNowPlaying(proxima);
                    trocarVideoPorGenero(proxima.genero);
                    if (isPlaying) playMusic();
                }
            }
            showControls();
        }

        function prevTrack() {
            if (modoAtual === "MPB_POP") {
                const atual = currentPlaylist[0];
                const nova = getMusicaMPBPOPAntiRepeticao(atual?.id);
                if (nova) {
                    currentPlaylist = [nova];
                    currentIndex = 0;
                    updateNowPlaying(nova);
                    trocarVideoPorGenero(nova.genero);
                    if (isPlaying) playMusic();
                }
            } else {
                if (currentPlaylist.length === 0) {
                    const m = getMusicaAntiRepeticao(musicas);
                    if (m) {
                        currentPlaylist = [m];
                        currentIndex = 0;
                        updateNowPlaying(m);
                        trocarVideoPorGenero(m.genero);
                        if (isPlaying) playMusic();
                    }
                    return;
                }
                if (currentPlaylist.length === 1) {
                    const unica = currentPlaylist[0];
                    adicionarAoHistorico(unica);
                    updateNowPlaying(unica);
                    trocarVideoPorGenero(unica.genero);
                    if (isPlaying) playMusic();
                    showControls();
                    return;
                }
                if (shuffleMode) {
                    let candidata = null, tentativas = 0;
                    const evitarId = currentPlaylist[currentIndex]?.id;
                    while (tentativas < 20) {
                        tentativas++;
                        const idx = Math.floor(Math.random() * currentPlaylist.length);
                        const test = currentPlaylist[idx];
                        if (test.id !== evitarId) {
                            candidata = test;
                            currentIndex = idx;
                            break;
                        }
                    }
                    if (!candidata) {
                        currentIndex = (currentIndex + 1) % currentPlaylist.length;
                        candidata = currentPlaylist[currentIndex];
                    }
                    if (candidata) {
                        adicionarAoHistorico(candidata);
                        updateNowPlaying(candidata);
                        trocarVideoPorGenero(candidata.genero);
                        if (isPlaying) playMusic();
                    }
                } else {
                    const evitarId = currentPlaylist[currentIndex]?.id;
                    let novoIndex = (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
                    if (currentPlaylist[novoIndex].id === evitarId && currentPlaylist.length > 1) {
                        novoIndex = (novoIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
                    }
                    currentIndex = novoIndex;
                    const track = currentPlaylist[currentIndex];
                    if (track) {
                        adicionarAoHistorico(track);
                        updateNowPlaying(track);
                        trocarVideoPorGenero(track.genero);
                        if (isPlaying) playMusic();
                    }
                }
            }
            showControls();
        }

        function toggleShuffle() {
            shuffleMode = !shuffleMode;
            shuffleBtn.classList.toggle('active', shuffleMode);
            showNotification(shuffleMode ? '🔀 Aleatório ON' : '➡️ Sequencial', 800);
            showControls();
        }

        function startTimer() {
            stopTimer();
            timerInterval = setInterval(() => {
                if (isPlaying && audio.duration && !audio.paused && audio.duration !== Infinity) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    progressFill.style.width = percent + '%';
                    currentTimeEl.textContent = formatTime(audio.currentTime);
                    totalTimeEl.textContent = formatTime(audio.duration);
                    if (audio.currentTime >= audio.duration - 0.5) {
                        nextTrack();
                    }
                }
            }, 200);
        }
        function stopTimer() { if (timerInterval) clearInterval(timerInterval); timerInterval = null; }

        function playSongById(id) {
            const musica = musicas.find(m => m.id === id);
            if (!musica) { showNotification("Música não encontrada", 1000); return; }
            
            audio.pause();
            audio.src = '';
            audio.load();
            
            modoAtual = "GENERO_ESPECIFICO";
            const listaGenero = musicas.filter(m => m.genero === musica.genero);
            let lista = listaGenero.filter(m => m.id !== musica.id);
            for (let i = lista.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [lista[i], lista[j]] = [lista[j], lista[i]];
            }
            currentPlaylist = [musica, ...lista];
            currentIndex = 0;
            historicoReproducao = [];
            
            updateNowPlaying(musica);
            trocarVideoPorGenero(musica.genero);
            genreBadge.innerHTML = `<i class="fas fa-music"></i> ${musica.genero}`;
            genreBadge.className = 'genre-badge';
            
            if (isBackgroundActive) {
                setTimeout(() => playMusic(), 200);
            }
            showNotification(`🎵 ${musica.title} - ${musica.artist}`, 2000);
        }

        // =================================================================
        // FAB
        // =================================================================
        function toggleFab() {
            fabOpen = !fabOpen;
            fabSub.classList.toggle('open', fabOpen);
            fabMain.innerHTML = fabOpen ? '<i class="fas fa-times"></i>' : '<i class="fas fa-plus"></i>';
        }

        // =================================================================
        // EVENTOS
        // =================================================================
        heartBtn.addEventListener('click', () => {
            if (currentPlaylist.length > 0) {
                const currentMusic = currentPlaylist[currentIndex] || currentPlaylist[0];
                if (currentMusic) {
                    toggleFavorito(currentMusic.id);
                    buildGenresGrid();
                }
            }
        });

        favTopBtn.addEventListener('click', openFavModal);
        closeFavModal.addEventListener('click', closeFavModalFn);
        closeFavBtn.addEventListener('click', closeFavModalFn);

        closeGenresBtn.addEventListener('click', closeGenresFn);

        fabMain.addEventListener('click', toggleFab);
        fabMain.addEventListener('touchstart', (e) => { e.preventDefault(); toggleFab(); }, { passive: false });
        fabGeneros.addEventListener('click', () => { openGenres(); toggleFab(); });
        fabGeneros.addEventListener('touchstart', (e) => { e.preventDefault(); openGenres(); toggleFab(); }, { passive: false });
        fabFeedback.addEventListener('click', () => { openFeedback(); toggleFab(); });
        fabFeedback.addEventListener('touchstart', (e) => { e.preventDefault(); openFeedback(); toggleFab(); }, { passive: false });
        fabYoutube.addEventListener('click', () => {
            window.open(LINK_YOUTUBE, '_blank');
            showNotification('📺 Abrindo vídeo...', 1500);
            toggleFab();
        });
        fabYoutube.addEventListener('touchstart', (e) => { e.preventDefault(); window.open(LINK_YOUTUBE, '_blank'); toggleFab(); }, { passive: false });

        playBtn.addEventListener('click', togglePlay);
        document.getElementById('nextBtn').addEventListener('click', nextTrack);
        document.getElementById('prevBtn').addEventListener('click', prevTrack);
        shuffleBtn.addEventListener('click', toggleShuffle);

        document.getElementById('progressBar').addEventListener('click', (e) => {
            if (audio.duration && !isNaN(audio.duration)) {
                const rect = e.currentTarget.getBoundingClientRect();
                audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
                showControls();
            }
        });

        document.getElementById('shareBtn').addEventListener('click', () => {
            if (navigator.share) {
                navigator.share({ title: 'Rádio Play 12', url: location.href });
            } else {
                navigator.clipboard.writeText(location.href);
                showNotification('🔗 Link copiado!');
            }
            showControls();
        });

        document.getElementById('shareMenuBtn').addEventListener('click', () => {
            if (navigator.share) {
                navigator.share({ title: 'Rádio Play 12', url: location.href });
            } else {
                navigator.clipboard.writeText(location.href);
                showNotification('🔗 Link copiado!');
            }
            document.getElementById('menuPopup').classList.remove('open');
        });

        document.getElementById('fullscreenMenuBtn').addEventListener('click', () => { document.documentElement.requestFullscreen(); document.getElementById('menuPopup').classList.remove('open'); });
        document.getElementById('btStatusMenuBtn').addEventListener('click', () => { 
            if (!navigator.bluetooth) { showNotification("❌ Bluetooth não suportado", 1500); return; }
            showNotification("🔍 Procurando...", 1500);
            navigator.bluetooth.requestDevice({ acceptAllDevices: true }).then(device => {
                showNotification(`✅ Conectado: ${device.name || 'Dispositivo'}`, 2000);
            }).catch(() => showNotification("❌ Nenhum dispositivo", 1500));
            document.getElementById('menuPopup').classList.remove('open');
        });
        document.getElementById('feedbackMenuBtn').addEventListener('click', () => { openFeedback(); document.getElementById('menuPopup').classList.remove('open'); });

        document.getElementById('tap-to-start').addEventListener('click', async () => {
            showNotification('🔊 Ativando...', 1000);
            await ativarAudio();
            tapToStart.style.display = 'none';
            try { document.documentElement.requestFullscreen(); } catch (e) {}
        });

        document.getElementById('menuButton').addEventListener('click', (e) => { e.stopPropagation(); document.getElementById('menuPopup').classList.toggle('open'); showControls(); });
        document.addEventListener('click', () => showControls());
        document.addEventListener('touchstart', () => showControls());

        favModal.addEventListener('click', (e) => {
            if (e.target === favModal) closeFavModalFn();
        });
        feedbackModal.addEventListener('click', (e) => {
            if (e.target === feedbackModal) closeFeedbackFn();
        });
        genresModal.addEventListener('click', (e) => {
            if (e.target === genresModal) closeGenresFn();
        });

        document.querySelectorAll('.star').forEach(star => {
            star.addEventListener('click', () => {
                currentRating = parseInt(star.dataset.rating);
                document.querySelectorAll('.star').forEach((s, i) => {
                    if (i < currentRating) { s.classList.add('fas', 'active'); s.classList.remove('far'); } 
                    else { s.classList.remove('fas', 'active'); s.classList.add('far'); }
                });
            });
        });

        closeFeedbackBtn.addEventListener('click', closeFeedbackFn);
        sendFeedbackBtn.addEventListener('click', sendFeedback);

        // =================================================================
        // CARREGAR PLAYLIST DO JSON
        // =================================================================
        async function carregarPlaylist() {
            try {
                const resposta = await fetch(PLAYLIST_URL);
                if (!resposta.ok) throw new Error('Erro ao carregar playlist');
                const dados = await resposta.json();
                return dados;
            } catch (erro) {
                console.error('Erro ao carregar playlist:', erro);
                showNotification('Erro ao carregar playlist!', 2000);
                return [];
            }
        }

        // =================================================================
        // INICIAR
        // =================================================================
        async function iniciar() {
            try {
                const dados = await carregarPlaylist();
                
                let validas = [];
                dados.forEach((musica) => {
                    if (musica.src && musica.src.trim() !== '' && musica.title && musica.title.trim() !== '') {
                        let g = (musica.genero || "POP").toUpperCase().trim();
                        if (g === "FORRO" || g === "FORRÓ") g = "FORRÓ";
                        validas.push({ ...musica, genero: g });
                    }
                });

                musicas = validas;
                console.log("✅ Playlist carregada:", musicas.length);

                try {
                    const savedFavorites = localStorage.getItem('radio_favorites_simple');
                    if (savedFavorites) favorites = JSON.parse(savedFavorites);
                } catch(e) { favorites = []; }

                modoAtual = "MPB_POP";
                genreBadge.innerHTML = '<i class="fas fa-exchange-alt"></i> MPB/POP';
                genreBadge.className = 'genre-badge';
                
                const primeira = getMusicaMPBPOPAntiRepeticao();
                if (primeira) {
                    currentPlaylist = [primeira];
                    currentIndex = 0;
                    updateNowPlaying(primeira);
                    adicionarAoHistorico(primeira);
                }

                updateFavCount();
                renderFavList();
                buildGenresGrid();

                setTimeout(() => {
                    splash.classList.add('hidden');
                    setTimeout(() => {
                        splash.style.display = 'none';
                        appContainer.style.display = 'block';
                        menuButton.style.display = 'flex';
                        tapToStart.style.display = 'block';
                    }, 500);
                }, 500);
            } catch (err) {
                console.error("Erro:", err);
                splash.innerHTML = `<div class="splash-loading"><i class="fas fa-exclamation-triangle"></i><p>Erro: ${err.message}</p><button onclick="location.reload()" style="margin-top:10px;padding:8px 20px;border-radius:20px;border:none;background:#00f3ff;color:#000;font-weight:bold;">Recarregar</button></div>`;
            }
        }

        window.addEventListener('load', function() {
            iniciar();
            console.log('✅ Player iniciado!');
        });
    </script>
</body>
</html>
