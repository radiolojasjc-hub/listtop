<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="description" content="RÁDIO PLAY 12 - Player PWA com tela bloqueada">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>RÁDIO PLAY 12</title>

    <!-- ===== PWA ===== -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <style>
        /* ===== SEU CSS (mantido do código moderno) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-gradient-1: #0f0c29;
            --bg-gradient-2: #302b63;
            --bg-gradient-3: #24243e;
            --card-bg: rgba(255,255,255,0.08);
            --card-border: rgba(255,255,255,0.15);
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --accent-1: #ff6b6b;
            --accent-2: #4ecdc4;
            --accent-3: #ffe66d;
            --glow: rgba(78,205,196,0.4);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000"><circle cx="50" cy="50" r="2" fill="white" opacity="0.3"/><circle cx="150" cy="80" r="1.5" fill="white" opacity="0.2"/><circle cx="250" cy="120" r="2" fill="white" opacity="0.3"/><circle cx="350" cy="200" r="1" fill="white" opacity="0.2"/><circle cx="450" cy="50" r="2" fill="white" opacity="0.3"/><circle cx="550" cy="150" r="1.5" fill="white" opacity="0.2"/><circle cx="650" cy="300" r="2" fill="white" opacity="0.3"/><circle cx="750" cy="80" r="1" fill="white" opacity="0.2"/><circle cx="850" cy="400" r="2" fill="white" opacity="0.3"/><circle cx="950" cy="250" r="1.5" fill="white" opacity="0.2"/></svg>');
            background-repeat: repeat;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            width: 45px;
            height: 45px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .fullscreen-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); border-radius: 20px; }
        .install-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: linear-gradient(135deg, var(--accent-1), #ff8e8e);
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            z-index: 1000;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .install-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(255,107,107,0.4); }
        .player-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border: 1px solid var(--card-border);
            transition: all 0.3s;
        }
        .video-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto 30px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
            transition: transform 0.3s;
        }
        .video-container:hover { transform: scale(1.02); }
        .video-container video { width: 100%; height: 100%; object-fit: cover; }
        .video-overlay {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .video-overlay:hover { background: rgba(0,0,0,0.8); transform: scale(1.1); }
        .song-info { text-align: center; margin-bottom: 35px; }
        .song-info h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent-2), var(--accent-3));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .song-info p { color: var(--text-secondary); font-size: 1rem; font-weight: 500; }
        .progress-container { margin-bottom: 35px; }
        .progress-bar {
            background: rgba(255,255,255,0.2);
            height: 6px;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .progress {
            background: linear-gradient(90deg, var(--accent-2), var(--accent-1));
            height: 100%;
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
            position: relative;
            box-shadow: 0 0 10px var(--glow);
        }
        .time-info { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 35px;
            margin-bottom: 30px;
        }
        .control-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border: 1px solid var(--card-border);
            font-size: 1.6rem;
            cursor: pointer;
            padding: 12px;
            border-radius: 50%;
            transition: all 0.3s;
            color: var(--text-primary);
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .control-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.2); box-shadow: 0 0 20px var(--glow); }
        .main-btn {
            background: linear-gradient(135deg, var(--accent-2), var(--accent-1));
            width: 70px;
            height: 70px;
            font-size: 2rem;
            box-shadow: 0 8px 25px rgba(78,205,196,0.4);
            border: none;
        }
        .main-btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(78,205,196,0.6); }
        .volume-control {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            margin-bottom: 25px;
            border: 1px solid var(--card-border);
        }
        .volume-control span { color: var(--text-secondary); font-size: 1.1rem; }
        .volume-control input {
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.2);
            -webkit-appearance: none;
        }
        .volume-control input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent-2);
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-2);
        }
        #volumeValue { min-width: 45px; font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; }
        .footer { text-align: center; padding: 20px; color: var(--text-secondary); font-size: 0.75rem; opacity: 0.7; margin-top: 10px; }
        .custom-alert {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 14px 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.2);
            animation: slideUp 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            max-width: 400px;
            margin: 0 auto;
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .alert-icon { font-size: 1.4rem; animation: bounce 0.5s ease; }
        @keyframes bounce { 0%,100%{transform:scale(1)}50%{transform:scale(1.2)} }
        .alert-text { flex: 1; margin-left: 12px; color: white; font-size: 0.9rem; font-weight: 500; }
        .alert-close { background: rgba(255,255,255,0.2); border: none; color: white; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; transition: all 0.2s; }
        .status-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ecdc4;
            z-index: 1000;
            box-shadow: 0 0 10px #4ecdc4;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.2)} }
        .lock-indicator {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 6px 14px;
            border-radius: 25px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: 500;
        }
        .activate-audio-btn {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--accent-2), var(--accent-1));
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            z-index: 2000;
            box-shadow: 0 8px 25px rgba(78,205,196,0.5);
            animation: glow 1.5s infinite;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }
        @keyframes glow { 0%,100% { box-shadow: 0 8px 25px rgba(78,205,196,0.5); } 50% { box-shadow: 0 8px 35px rgba(78,205,196,0.8); } }
        .activate-audio-btn:active { transform: translateX(-50%) scale(0.95); }
        @media (max-width: 480px) {
            .container { padding: 15px; }
            .player-card { padding: 25px 20px; }
            .video-container { width: 200px; height: 200px; }
            .controls { gap: 20px; }
            .control-btn { width: 45px; height: 45px; font-size: 1.3rem; }
            .main-btn { width: 60px; height: 60px; font-size: 1.8rem; }
            .song-info h2 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="fullscreen-btn" id="fullscreenBtn" title="Tela Cheia">⛶</button>
        <button class="install-btn" id="installHeaderBtn">📱 Instalar App</button>

        <div class="player-card">
            <div class="video-container">
                <video id="albumVideo" loop muted playsinline autoplay>
                    <source src="macacopwa.mp4" type="video/mp4">
                </video>
                <div class="video-overlay" id="videoToggleBtn">
                    <span>⏸</span>
                </div>
            </div>
            
            <div class="song-info">
                <h2 id="songTitle">Carregando...</h2>
                <p id="artistName">Rádio Playlist</p>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress" id="progress"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
            
            <div class="controls">
                <button id="prevBtn" class="control-btn" title="Anterior">⏮</button>
                <button id="playPauseBtn" class="control-btn main-btn" title="Play/Pause">▶</button>
                <button id="nextBtn" class="control-btn" title="Próxima">⏭</button>
            </div>
            
            <div class="volume-control">
                <span>🔊</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="70">
                <span id="volumeValue">70%</span>
            </div>
        </div>
        
        <footer class="footer">
            <p>🎧 RÁDIO PLAY 12 | Toca com Tela Bloqueada</p>
        </footer>
    </div>
    
    <div class="custom-alert" id="customAlert" style="display: none;">
        <div class="alert-icon">🎵</div>
        <div class="alert-text" id="alertText"></div>
        <button class="alert-close" id="closeAlertBtn">×</button>
    </div>
    
    <div class="status-indicator" id="statusIndicator"></div>
    <div class="lock-indicator" id="lockIndicator">
        <span>🔓</span>
        <span>Tela ativa</span>
    </div>
    
    <button class="activate-audio-btn" id="activateAudioBtn">
        🎵 ATIVAR MÚSICA
    </button>
    
    <audio id="audioPlayer" preload="auto"></audio>

    <script>
        // ============================================================
        // ===== PLAYLIST (SUBSTITUA PELA SUA) =====
        // ============================================================
        // TESTE COM 1 MÚSICA – DEPOIS ADICIONE AS 600+
        const songs = [
            { id: 1, title: "A Francesa", artist: "Kiko Zambich", url: "A-Francesa-Kiko-Zambich-mpb.m4a" }
            // ADICIONE AS DEMAIS MÚSICAS AQUI (copie do seu arquivo antigo)
        ];

        // ============================================================
        // FUNÇÕES DO PLAYER (MANTIDAS IGUAIS)
        // ============================================================
        function showAlert(message, type = 'info') {
            const alertDiv = document.getElementById('customAlert');
            const alertText = document.getElementById('alertText');
            const alertIcon = document.querySelector('.alert-icon');
            const icons = { online: '🟢', offline: '🔴', lock: '🔒', music: '🎵', info: '✨' };
            alertIcon.innerHTML = icons[type] || '🎵';
            alertText.textContent = message;
            alertDiv.style.display = 'flex';
            setTimeout(() => { if (alertDiv.style.display === 'flex') alertDiv.style.display = 'none'; }, 4000);
        }

        document.getElementById('closeAlertBtn').addEventListener('click', () => {
            document.getElementById('customAlert').style.display = 'none';
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                document.getElementById('fullscreenBtn').innerHTML = '✕';
                showAlert('⛶ Modo tela cheia ativado!', 'info');
            } else {
                document.exitFullscreen();
                document.getElementById('fullscreenBtn').innerHTML = '⛶';
                showAlert('⬚ Modo tela cheia desativado', 'info');
            }
        }
        document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);

        let wakeLock = null;
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('✅ Wake Lock ativado');
                    wakeLock.addEventListener('release', () => console.log('Wake Lock liberado'));
                } catch (err) { console.log('❌ Wake Lock falhou:', err); }
            }
        }
        async function releaseWakeLock() {
            if (wakeLock !== null) { await wakeLock.release(); wakeLock = null; }
        }

        let isScreenLocked = false;
        const lockIndicator = document.getElementById('lockIndicator');
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isScreenLocked = true;
                lockIndicator.innerHTML = '<span>🔒</span><span>Tela Bloqueada - TOCANDO</span>';
                lockIndicator.style.background = 'linear-gradient(135deg, #4ecdc4, #ff6b6b)';
                lockIndicator.style.color = 'white';
                showAlert('🔒 Tela bloqueada - Música continua!', 'lock');
            } else {
                isScreenLocked = false;
                lockIndicator.innerHTML = '<span>🔓</span><span>Tela ativa</span>';
                lockIndicator.style.background = 'rgba(0,0,0,0.7)';
                lockIndicator.style.color = 'rgba(255,255,255,0.7)';
            }
        });

        let currentSongIndex = 0;
        let isPlaying = false;
        let audioPlayer = document.getElementById('audioPlayer');
        let installPrompt = null;
        let currentVolume = 70;
        let audioInitialized = false;
        const albumVideo = document.getElementById('albumVideo');
        const videoToggleBtn = document.getElementById('videoToggleBtn');
        const activateBtn = document.getElementById('activateAudioBtn');
        let isVideoPlaying = true;

        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeValue = document.getElementById('volumeValue');
        const progressBar = document.getElementById('progressBar');
        const songTitle = document.getElementById('songTitle');
        const artistName = document.getElementById('artistName');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const statusIndicator = document.getElementById('statusIndicator');

        function initializeAudio() {
            if (audioInitialized) return;
            audioInitialized = true;
            activateBtn.style.display = 'none';
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioCtx = new AudioContext();
                const silentGain = audioCtx.createGain();
                silentGain.gain.value = 0;
                silentGain.connect(audioCtx.destination);
                const silentOsc = audioCtx.createOscillator();
                silentOsc.connect(silentGain);
                silentOsc.start();
                audioCtx.resume();
                console.log('✅ Web Audio API ativada');
            } catch(e) { console.log('Web Audio API não suportada:', e); }
            requestWakeLock();
            setTimeout(() => { if (!isPlaying) togglePlayPause(); }, 100);
            showAlert('🎵 Áudio ativado! Bloqueie a tela e a música continua!', 'online');
        }
        activateBtn.addEventListener('click', initializeAudio);

        function toggleVideo() {
            if (isVideoPlaying) { albumVideo.pause(); videoToggleBtn.innerHTML = '<span>▶</span>'; isVideoPlaying = false; }
            else { albumVideo.play(); videoToggleBtn.innerHTML = '<span>⏸</span>'; isVideoPlaying = true; }
        }
        albumVideo.addEventListener('canplay', () => albumVideo.play().catch(e => console.log('Vídeo precisa de interação')));
        videoToggleBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleVideo(); });

        function updateMediaSession() {
            if ('mediaSession' in navigator) {
                const song = songs[currentSongIndex];
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.title,
                    artist: song.artist,
                    album: 'Rádio Playlist'
                });
                navigator.mediaSession.setActionHandler('play', () => togglePlayPause());
                navigator.mediaSession.setActionHandler('pause', () => togglePlayPause());
                navigator.mediaSession.setActionHandler('previoustrack', () => prevSong());
                navigator.mediaSession.setActionHandler('nexttrack', () => nextSong());
            }
        }

        function playSong(index) {
            if (index < 0) index = songs.length - 1;
            if (index >= songs.length) index = 0;
            currentSongIndex = index;
            const song = songs[currentSongIndex];
            audioPlayer.src = song.url;
            songTitle.textContent = song.title;
            artistName.textContent = song.artist;
            updateMediaSession();
            showAlert(`🎵 Tocando: ${song.title}`, 'music');
            console.log(`🎵 Música ${currentSongIndex+1}/${songs.length}: ${song.title}`);
            audioPlayer.load();
            audioPlayer.onerror = function() {
                console.error('Erro ao carregar música:', song.url);
                showAlert('❌ Erro ao carregar a música!', 'offline');
            };
            if (isPlaying) {
                audioPlayer.play().catch(e => { console.log('Erro no play:', e); isPlaying = false; playPauseBtn.textContent = '▶'; });
            }
            audioPlayer.addEventListener('loadedmetadata', () => {
                durationEl.textContent = formatTime(audioPlayer.duration);
            });
        }

        function togglePlayPause() {
            if (isPlaying) {
                audioPlayer.pause();
                playPauseBtn.textContent = '▶';
                showAlert('⏸ Pausado', 'info');
                statusIndicator.style.background = '#888';
                releaseWakeLock();
                if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
            } else {
                audioPlayer.play().catch(e => {
                    console.log('Erro no play:', e);
                    showAlert('❌ Clique no botão "ATIVAR MÚSICA" primeiro', 'offline');
                    activateBtn.style.display = 'flex';
                });
                playPauseBtn.textContent = '⏸';
                showAlert('▶ Tocando: ' + songs[currentSongIndex].title, 'music');
                statusIndicator.style.background = '#4ecdc4';
                requestWakeLock();
                if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
            }
            isPlaying = !isPlaying;
        }

        function nextSong() {
            let nextIndex = (currentSongIndex + 1) % songs.length;
            playSong(nextIndex);
            showAlert(`⏭ Próxima: ${songs[nextIndex].title}`, 'music');
            if (!isPlaying) setTimeout(() => togglePlayPause(), 100);
        }

        function prevSong() {
            if (audioPlayer.currentTime > 3) { audioPlayer.currentTime = 0; showAlert('⏮ Voltando ao início', 'info'); }
            else { let prevIndex = currentSongIndex - 1; if (prevIndex < 0) prevIndex = songs.length - 1; playSong(prevIndex); showAlert(`⏮ Anterior: ${songs[prevIndex].title}`, 'music'); }
        }

        function updateProgress() {
            if (audioPlayer.duration) {
                const progressPercent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                document.getElementById('progress').style.width = `${progressPercent}%`;
                currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
            }
        }

        function setProgress(e) {
            const rect = progressBar.getBoundingClientRect();
            const clickPosition = (e.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = clickPosition * audioPlayer.duration;
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateVolume() {
            const volume = currentVolume / 100;
            audioPlayer.volume = volume;
            volumeValue.textContent = `${currentVolume}%`;
            volumeSlider.value = currentVolume;
        }

        audioPlayer.addEventListener('ended', () => {
            console.log(`🎵 Música terminou - Alternando...`);
            let nextIndex = (currentSongIndex + 1) % songs.length;
            playSong(nextIndex);
            setTimeout(() => { if (!isPlaying) togglePlayPause(); }, 150);
        });

        // ============================================================
        // SERVICE WORKER (PWA)
        // ============================================================
        async function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                try {
                    const allUrls = ['/', window.location.pathname, 'macacopwa.mp4', ...songs.map(s => s.url)];
                    const swCode = `
                        const CACHE_NAME = 'radio-v8';
                        const urlsToCache = ${JSON.stringify(allUrls)};
                        self.addEventListener('install', e => e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(urlsToCache))));
                        self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
                    `;
                    const blob = new Blob([swCode], { type: 'application/javascript' });
                    await navigator.serviceWorker.register(URL.createObjectURL(blob));
                    console.log('✅ Service Worker registrado!');
                    showAlert('✨ App pronto para OFFLINE!', 'online');
                } catch (error) {
                    console.log('❌ Service Worker falhou:', error);
                }
            }
        }

        // ============================================================
        // INSTALAÇÃO PWA
        // ============================================================
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            installPrompt = e;
            document.getElementById('installHeaderBtn').style.display = 'flex';
        });

        document.getElementById('installHeaderBtn')?.addEventListener('click', () => {
            if (installPrompt) {
                installPrompt.prompt();
                installPrompt = null;
                document.getElementById('installHeaderBtn').style.display = 'none';
            }
        });

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        playPauseBtn.addEventListener('click', togglePlayPause);
        nextBtn.addEventListener('click', nextSong);
        prevBtn.addEventListener('click', prevSong);
        progressBar.addEventListener('click', setProgress);
        audioPlayer.addEventListener('timeupdate', updateProgress);
        volumeSlider.addEventListener('input', (e) => { currentVolume = e.target.value; updateVolume(); });
        window.addEventListener('online', () => { showAlert('🟢 ONLINE!', 'online'); statusIndicator.style.background = '#4ecdc4'; });
        window.addEventListener('offline', () => { showAlert('🔴 OFFLINE - Músicas cacheadas!', 'offline'); statusIndicator.style.background = '#f56565'; });

        // ============================================================
        // INICIALIZAR
        // ============================================================
        updateVolume();
        playSong(0);
        updateMediaSession();
        registerServiceWorker();
        statusIndicator.style.background = navigator.onLine ? '#4ecdc4' : '#f56565';
        console.log('🎵 RÁDIO PLAY 12 - Player moderno!');
        console.log('🔒 INSTRUÇÕES: Clique em "ATIVAR MÚSICA" e bloqueie a tela.');
    </script>
</body>
</html>
