        // =================================================================
        // FUNÇÕES
        // =================================================================
        function showNotification(msg, duration = 1500) {
            notification.textContent = msg;
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), duration);
        }

        function formatTime(sec) {
            if (!sec || isNaN(sec)) return "0:00";
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function showControls() {
            bottomControls.classList.add('visible');
            if (hideControlsTimeout) clearTimeout(hideControlsTimeout);
            hideControlsTimeout = setTimeout(() => bottomControls.classList.remove('visible'), 5000);
        }

        function updateNowPlaying(track) {
            if (track) {
                nowTitle.textContent = track.title;
                nowArtist.textContent = track.artist;
                scrollText.innerHTML = `🎵 ${track.title} - ${track.artist} [${track.genero}] 🎵`;
                updateHeartIcon(track.id);
            }
        }

        function updateHeartIcon(musicId) {
            if (favorites.includes(musicId)) {
                heartBtn.className = 'fav-heart active';
                heartBtn.innerHTML = '<i class="fas fa-heart"></i>';
            } else {
                heartBtn.className = 'fav-heart';
                heartBtn.innerHTML = '<i class="far fa-heart"></i>';
            }
            updateFavCount();
        }

        function updateFavCount() {
            favCount.textContent = favorites.length;
        }

        function toggleFavorito(musicId) {
            const index = favorites.indexOf(musicId);
            if (index > -1) {
                favorites.splice(index, 1);
                showNotification('❤️ Removido dos favoritos', 1000);
            } else {
                favorites.push(musicId);
                showNotification('❤️ Adicionado aos favoritos!', 1000);
            }
            localStorage.setItem('radio_favorites_simple', JSON.stringify(favorites));
            updateHeartIcon(musicId);
            renderFavList();
            buildGenresGrid();
        }

        function renderFavList() {
            favList.innerHTML = '';
            if (favorites.length === 0) {
                favList.innerHTML = '<div class="fav-empty">Nenhuma música favorita</div>';
                return;
            }
            const favMusicas = favorites.map(id => musicas.find(m => m.id === id)).filter(Boolean);
            if (favMusicas.length === 0) {
                favList.innerHTML = '<div class="fav-empty">Nenhuma música favorita encontrada</div>';
                return;
            }
            favMusicas.forEach(m => {
                const div = document.createElement('div');
                div.className = 'fav-item';
                div.innerHTML = `
                    <div class="info" data-id="${m.id}">
                        <div class="title">${m.title}</div>
                        <div class="artist">${m.artist}</div>
                    </div>
                    <button class="remove" data-id="${m.id}"><i class="fas fa-times-circle"></i></button>
                `;
                div.querySelector('.info').addEventListener('click', () => {
                    playSongById(m.id);
                    favModal.classList.remove('open');
                });
                div.querySelector('.remove').addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleFavorito(m.id);
                    renderFavList();
                    updateFavCount();
                    buildGenresGrid();
                });
                favList.appendChild(div);
            });
        }

        function openFavModal() {
            renderFavList();
            favModal.classList.add('open');
        }

        function closeFavModalFn() {
            favModal.classList.remove('open');
        }

        // =================================================================
        // GENRES
        // =================================================================
        function buildGenresGrid() {
            genresGrid.innerHTML = '';
            
            const favCard = document.createElement('div');
            favCard.className = 'genre-card fav-card';
            favCard.innerHTML = `<i class="fas fa-heart" style="color:#ff2d7f;margin-right:8px;"></i> FAVORITOS (${favorites.length})`;
            favCard.onclick = () => { 
                genresModal.classList.remove('open');
                entrarModoFavoritos();
            };
            genresGrid.appendChild(favCard);
            
            const generos = ["MPB/POP", "SERTANEJO", "FORRÓ", "SAMBA", "POP", "MPB", "BREGA", "GLOBAL HITS", "MODA TOP", "CRISTÃ HITS", "REGGAE"];
            const cores = {
                "MPB/POP": "#00f3ff",
                "SERTANEJO": "#8B4513",
                "FORRÓ": "#ff6b35",
                "SAMBA": "#f1c40f",
                "POP": "#e74c3c",
                "MPB": "#2ecc71",
                "BREGA": "#ff69b4",
                "GLOBAL HITS": "#1abc9c",
                "MODA TOP": "#9b59b6",
                "CRISTÃ HITS": "#f39c12",
                "REGGAE": "#008000"
            };
            generos.forEach(genero => {
                const filtro = genero === "MPB/POP" ? "MPB_POP" : genero;
                const card = document.createElement('div');
                card.className = 'genre-card';
                card.style.border = `2px solid ${cores[genero] || '#fff'}`;
                card.style.background = `linear-gradient(135deg, ${cores[genero] || '#fff'}22, #1a1a2e)`;
                card.textContent = genero;
                card.onclick = () => { filterByGenre(filtro); };
                genresGrid.appendChild(card);
            });
        }

        function openGenres() {
            buildGenresGrid();
            genresModal.classList.add('open');
            showControls();
        }

        function closeGenresFn() {
            genresModal.classList.remove('open');
        }

        // =================================================================
        // PLAYER
        // =================================================================
        function createSilentAudio() {
            try {
                const sampleRate = 44100, duration = 1;
                const numSamples = sampleRate * duration;
                const buffer = new ArrayBuffer(44 + numSamples * 2);
                const view = new DataView(buffer);
                const writeString = (view, offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
                writeString(view, 0, 'RIFF');
                view.setUint32(4, 36 + numSamples * 2, true);
                writeString(view, 8, 'WAVE');
                writeString(view, 12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(view, 36, 'data');
                view.setUint32(40, numSamples * 2, true);
                let offset = 44;
                for (let i = 0; i < numSamples; i++) { view.setInt16(offset, 0, true); offset += 2; }
                return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
            } catch(e) {
                return '';
            }
        }
        const backgroundAudio = document.getElementById('backgroundAudio');

        async function ativarAudio() {
            try {
                const silentUrl = createSilentAudio();
                if (!silentUrl) throw new Error('Erro ao criar áudio');
                backgroundAudio.src = silentUrl;
                backgroundAudio.loop = true;
                backgroundAudio.volume = 0.001;
                await backgroundAudio.play();
                isBackgroundActive = true;
                audioIndicator.innerHTML = '<i class="fas fa-music"></i> Ativo';
                audioIndicator.style.color = '#4ade80';
                if ('wakeLock' in navigator) try { await navigator.wakeLock.request('screen'); } catch (e) {}
                await playMusic();
                return true;
            } catch (error) {
                console.error('Erro ativar audio:', error);
                isBackgroundActive = true;
                await playMusic();
                return true;
            }
        }

        function adicionarAoHistorico(musica) {
            if (!musica) return;
            historicoReproducao = historicoReproducao.filter(m => m.id !== musica.id);
            historicoReproducao.unshift(musica);
            if (historicoReproducao.length > MAX_HISTORICO) historicoReproducao.pop();
        }

        function getMusicaAntiRepeticao(lista, evitarId = null) {
            if (!lista || lista.length === 0) return null;
            if (lista.length === 1) {
                const unica = lista[0];
                adicionarAoHistorico(unica);
                return unica;
            }
            let idsHistorico = new Set(historicoReproducao.map(m => m.id));
            let candidatas = lista.filter(m => !idsHistorico.has(m.id));
            if (candidatas.length === 0) {
                const idsLiberados = historicoReproducao.slice(-3).map(m => m.id);
                candidatas = lista.filter(m => idsLiberados.includes(m.id));
                if (candidatas.length === 0) candidatas = [...lista];
            }
            if (evitarId && candidatas.length > 1) {
                candidatas = candidatas.filter(m => m.id !== evitarId);
            }
            if (candidatas.length === 0) candidatas = [...lista];
            const escolhida = candidatas[Math.floor(Math.random() * candidatas.length)];
            adicionarAoHistorico(escolhida);
            return escolhida;
        }

        function getMusicaMPBPOPAntiRepeticao(evitarId = null) {
            const mpb = musicas.filter(m => m.genero === "MPB");
            const pop = musicas.filter(m => m.genero === "POP");
            if (mpb.length === 0 && pop.length === 0) return getMusicaAntiRepeticao(musicas, evitarId);
            if (mpb.length === 0) return getMusicaAntiRepeticao(pop, evitarId);
            if (pop.length === 0) return getMusicaAntiRepeticao(mpb, evitarId);
            
            let novoGenero;
            if (ultimoGeneroTocado === "MPB") novoGenero = "POP";
            else if (ultimoGeneroTocado === "POP") novoGenero = "MPB";
            else novoGenero = Math.random() < 0.5 ? "MPB" : "POP";
            
            let lista = novoGenero === "MPB" ? mpb : pop;
            const m = getMusicaAntiRepeticao(lista, evitarId);
            if (m) ultimoGeneroTocado = m.genero;
            return m;
        }

        function trocarVideoPorGenero(genero) {
            let src = 'apk300.mp4';
            const g = (genero || '').toUpperCase().trim();
            if (g === 'SERTANEJO') src = 'sertanejo.mp4';
            else if (g === 'CRISTÃ HITS' || g === 'CRISTÃ' || g === 'GOSPEL') src = 'cristo.mp4';
            if (!bgVideo.src.includes(src)) {
                bgVideo.src = src;

                bgVideo.play().catch(e => console.log('Vídeo:', e));

        // FUNÇÃO PRINCIPAL DE PLAY CORRIGIDA
        async function playMusic() {
            if (!isBackgroundActive) {
                showNotification("⚠️ Ative o áudio primeiro!", 1000);
                return;
            }
            if (!musicas.length) { 
                showNotification("Playlist vazia!", 1500); 
                return; 
            }

            let track = null;
            
            // Se não tem playlist, cria uma
            if (currentPlaylist.length === 0) {
                if (modoAtual === "MPB_POP") {
                    track = getMusicaMPBPOPAntiRepeticao();
                } else {
                    track = getMusicaAntiRepeticao(musicas);
                }
                if (track) {
                    currentPlaylist = [track];
                    currentIndex = 0;
                }
            } else {
                // Pega a música atual da playlist
                if (currentIndex >= currentPlaylist.length) {
                    currentIndex = 0;
                }
                track = currentPlaylist[currentIndex];
                
                // Se a música atual está no histórico, busca outra
                if (historicoReproducao.find(m => m.id === track?.id) && currentPlaylist.length > 1) {
                    track = getMusicaAntiRepeticao(currentPlaylist, track?.id);
                    if (track) {
                        currentIndex = currentPlaylist.findIndex(m => m.id === track.id);
                        if (currentIndex === -1) currentIndex = 0;
                    }
                }
            }

            if (!track || !track.src) {
                showNotification("Música indisponível, pulando...", 1000);
                setTimeout(nextTrack, 500);
                return;
            }

            try {
                trocarVideoPorGenero(track.genero);
                
                // Para o áudio atual
                audio.pause();
                audio.src = '';
                audio.load();
                
                // Carrega a nova música
                audio.src = track.src;
                audio.load();

                // Toca quando carregar
                audio.oncanplay = function() {
                    audio.play()
                        .then(() => {
                            updateNowPlaying(track);
                            adicionarAoHistorico(track);
                            console.log('🎵 Tocando:', track.title);
                        })
                        .catch(e => {
                            console.error("Erro ao tocar:", e);
                            showNotification('Erro ao tocar música', 1000);
                            setTimeout(nextTrack, 1000);
                        });
                };

                audio.onerror = function() {
                    console.error('Erro de áudio em:', track.title);
                    showNotification(`Erro em: ${track.title}`, 1000);
                    setTimeout(nextTrack, 1000);
                };

                // Fallback se demorar muito
                setTimeout(() => {
                    if (audio.paused && isBackgroundActive) {
                        console.log('Timeout - tentando próximo');
                        nextTrack();
                    }
                }, 8000);

            } catch (err) {
                console.error('Erro em playMusic:', err);
                showNotification('Erro inesperado', 1000);
                setTimeout(nextTrack, 1000);
            }
        }

        function pauseMusic() { audio.pause(); }
        
        function togglePlay() {
            if (!isBackgroundActive) { 
                showNotification("Clique em ATIVAR RÁDIO primeiro!", 1000); 
                return; 
            }
            if (audio.paused) {
                // Se está pausado e já tem uma música carregada, tenta tocar
                if (audio.src && audio.src !== '') {
                    audio.play().catch(() => playMusic());
                } else {
                    playMusic();
                }
            } else {
                pauseMusic();
            }
            showControls();
        }

        function nextTrack() {
            console.log('⏭️ Próxima música');
            
            if (modoAtual === "MPB_POP") {
                const atual = currentPlaylist[0]?.id || null;
                const nova = getMusicaMPBPOPAntiRepeticao(atual);
                if (nova) {
                    currentPlaylist = [nova];
                    currentIndex = 0;
                    updateNowPlaying(nova);
                    trocarVideoPorGenero(nova.genero);
                    if (isPlaying) playMusic();
                }
                return;
            }
            
            // Modo normal
            if (currentPlaylist.length === 0) {
                const m = getMusicaAntiRepeticao(musicas);
                if (m) {
                    currentPlaylist = [m];
                    currentIndex = 0;
                    updateNowPlaying(m);
                    trocarVideoPorGenero(m.genero);
                    if (isPlaying) playMusic();
                }
                return;
            }
            
            if (currentPlaylist.length === 1) {
                const unica = currentPlaylist[0];
                adicionarAoHistorico(unica);
                updateNowPlaying(unica);
                trocarVideoPorGenero(unica.genero);
                if (isPlaying) playMusic();
                showControls();
                return;
            }
            
            let proxima = null;
            let tentativas = 0;
            const maxTentativas = currentPlaylist.length * 3;
            const evitarId = currentPlaylist[currentIndex]?.id;
            
            while (tentativas < maxTentativas) {
                tentativas++;
                let idx = shuffleMode ? Math.floor(Math.random() * currentPlaylist.length) : (currentIndex + 1) % currentPlaylist.length;
                const candidata = currentPlaylist[idx];
                if (candidata.id === evitarId && currentPlaylist.length > 1) continue;
                const noHistorico = !historicoReproducao.find(h => h.id === candidata.id);
                if (noHistorico || historicoReproducao.length < 3 || currentPlaylist.length <= 3) {
                    proxima = candidata;
                    currentIndex = idx;
                    break;
                }
            }
            
            if (!proxima) {
                currentIndex = shuffleMode ? Math.floor(Math.random() * currentPlaylist.length) : (currentIndex + 1) % currentPlaylist.length;
                proxima = currentPlaylist[currentIndex];
            }
            
            if (proxima) {
                adicionarAoHistorico(proxima);
                updateNowPlaying(proxima);
                trocarVideoPorGenero(proxima.genero);
                if (isPlaying) playMusic();
            }
            showControls();
        }

        function prevTrack() {
            console.log('⏮️ Música anterior');
            
            if (modoAtual === "MPB_POP") {
                const atual = currentPlaylist[0]?.id || null;
                const nova = getMusicaMPBPOPAntiRepeticao(atual);
                if (nova) {
                    currentPlaylist = [nova];
                    currentIndex = 0;
                    updateNowPlaying(nova);
                    trocarVideoPorGenero(nova.genero);
                    if (isPlaying) playMusic();
                }
            } else {
                if (currentPlaylist.length === 0) {
                    const m = getMusicaAntiRepeticao(musicas);
                    if (m) {
                        currentPlaylist = [m];
                        currentIndex = 0;
                        updateNowPlaying(m);
                        trocarVideoPorGenero(m.genero);
                        if (isPlaying) playMusic();
                    }
                    return;
                }
                if (currentPlaylist.length === 1) {
                    const unica = currentPlaylist[0];
                    adicionarAoHistorico(unica);
                    updateNowPlaying(unica);
                    trocarVideoPorGenero(unica.genero);
                    if (isPlaying) playMusic();
                    showControls();
                    return;
                }
                
                if (shuffleMode) {
                    let candidata = null, tentativas = 0;
                    const evitarId = currentPlaylist[currentIndex]?.id;
                    while (tentativas < 20) {
                        tentativas++;
                        const idx = Math.floor(Math.random() * currentPlaylist.length);
                        const test = currentPlaylist[idx];
                        if (test.id !== evitarId) {
                            candidata = test;
                            currentIndex = idx;
                            break;
                        }
                    }
                    if (!candidata) {
                        currentIndex = (currentIndex + 1) % currentPlaylist.length;
                        candidata = currentPlaylist[currentIndex];
                    }
                    if (candidata) {
                        adicionarAoHistorico(candidata);
                        updateNowPlaying(candidata);
                        trocarVideoPorGenero(candidata.genero);
                        if (isPlaying) playMusic();
                    }
                } else {
                    const evitarId = currentPlaylist[currentIndex]?.id;
                    let novoIndex = (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
                    if (currentPlaylist[novoIndex].id === evitarId && currentPlaylist.length > 1) {
                        novoIndex = (novoIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
                    }
                    currentIndex = novoIndex;
                    const track = currentPlaylist[currentIndex];
                    if (track) {
                        adicionarAoHistorico(track);
                        updateNowPlaying(track);
                        trocarVideoPorGenero(track.genero);
                        if (isPlaying) playMusic();
                    }
                }
            }
            showControls();
        }

        });

        closeFeedbackBtn.addEventListener('click', closeFeedbackFn);
        sendFeedbackBtn.addEventListener('click', sendFeedback);

        // =================================================================
        // INICIAR
        // =================================================================
        function iniciarPlaylist(dados) {
            try {
                let validas = [];
                dados.forEach((musica) => {
                    if (musica.src && musica.src.trim() !== '' && musica.title && musica.title.trim() !== '') {
                        let g = (musica.genero || "POP").toUpperCase().trim();
                        if (g === "FORRO" || g === "FORRÓ") g = "FORRÓ";
                        validas.push({ ...musica, genero: g });
                    }
                });

                musicas = validas;
                console.log("✅ Playlist carregada:", musicas.length);
                console.log("📁 Músicas:", musicas);

                try {
                    const savedFavorites = localStorage.getItem('radio_favorites_simple');
                    if (savedFavorites) favorites = JSON.parse(savedFavorites);
                } catch(e) { favorites = []; }

                modoAtual = "MPB_POP";
                genreBadge.innerHTML = '<i class="fas fa-exchange-alt"></i> MPB/POP';
                genreBadge.className = 'genre-badge';
                
                const primeira = getMusicaMPBPOPAntiRepeticao();
                if (primeira) {
                    currentPlaylist = [primeira];
                    currentIndex = 0;
                    updateNowPlaying(primeira);
                    adicionarAoHistorico(primeira);
                } else if (musicas.length > 0) {
                    // Fallback: pega a primeira música disponível
                    const fallback = musicas[0];
                    currentPlaylist = [fallback];
                    currentIndex = 0;
                    updateNowPlaying(fallback);
                    adicionarAoHistorico(fallback);
                }

                updateFavCount();
                renderFavList();
                buildGenresGrid();

                setTimeout(() => {
                    splash.classList.add('hidden');
                    setTimeout(() => {
                        splash.style.display = 'none';
                        appContainer.style.display = 'block';
                        menuButton.style.display = 'flex';
                        tapToStart.style.display = 'block';
                    }, 500);
                }, 500);
            } catch (err) {
                console.error("Erro:", err);
                splash.innerHTML = `<div class="splash-loading"><i class="fas fa-exclamation-triangle"></i><p>Erro: ${err.message}</p><button onclick="location.reload()" style="margin-top:10px;padding:8px 20px;border-radius:20px;border:none;background:#00f3ff;color:#000;font-weight:bold;">Recarregar</button></div>`;
            }
        }

        window.addEventListener('load', function() {
            iniciarPlaylist(PLAYLIST_ORIGINAL);
            console.log('✅ Player iniciado!');
        });
    </script>
</body>
</html>
